<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MediStock Tracker - Workspace Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-slate-50 text-slate-800 font-sans antialiased min-h-screen">

    <div id="loading-overlay" class="fixed inset-0 bg-slate-900/40 backdrop-blur-sm flex items-center justify-center z-50">
        <div class="bg-white p-5 rounded-xl shadow-lg flex items-center gap-3">
            <div class="w-6 h-6 border-4 border-blue-600 border-t-transparent rounded-full animate-spin"></div>
            <span class="font-medium text-slate-700">Verifying session profile configuration...</span>
        </div>
    </div>

    <!-- APP DASHBOARD VIEW -->
    <div id="dashboard-view">
        <!-- Navbar -->
        <nav class="bg-blue-600 text-white shadow-md p-4">
            <div class="max-w-6xl mx-auto flex flex-col sm:flex-row justify-between items-center gap-3">
                <div class="flex items-center gap-2">
                    <h1 class="text-xl font-bold tracking-tight">📦 MediStock</h1>
                    <div class="flex flex-col gap-0.5 ml-2">
                        <span id="nav-org-display" class="text-xs bg-blue-700 text-blue-100 font-bold px-2.5 py-1 rounded border border-blue-500/30 font-mono w-fit">Loading Workspace...</span>
                        <!-- Placeholder rendering the active user identity -->
                        <span id="nav-user-display" class="text-[11px] text-blue-200 font-medium px-0.5"></span>
                    </div>
                </div>
                <div class="flex items-center gap-3 w-full sm:w-auto justify-end">
                    <button id="export-btn" class="text-xs bg-blue-500 hover:bg-blue-700 font-semibold px-3 py-1.5 rounded-full transition-colors cursor-pointer flex items-center gap-1 border border-blue-400/30 shadow-sm">
                        📥 Export CSV
                    </button>
                    <span class="text-sm bg-blue-700 px-3 py-1 rounded-full whitespace-nowrap" id="total-items">Total Items: 0</span>
                    <button id="logout-btn" class="text-xs font-semibold bg-red-500 hover:bg-red-600 text-white px-3 py-1.5 rounded-lg cursor-pointer transition-colors">
                        Logout
                    </button>
                </div>
            </div>
        </nav>

        <!-- Main Content Container -->
        <main class="max-w-6xl mx-auto p-4 md:p-6 grid grid-cols-1 lg:grid-cols-3 gap-6">
            <!-- Left Column: Add Product Form -->
            <section class="bg-white p-6 rounded-xl shadow-sm border border-slate-100 h-fit">
                <h2 class="text-lg font-semibold mb-4 text-slate-900">Add New Batch</h2>
                <form id="product-form" class="space-y-4">
                    <div>
                        <label class="block text-xs font-bold uppercase text-slate-500 mb-1">Item Name</label>
                        <input type="text" id="item-name" required class="w-full p-2 border border-slate-200 rounded-lg focus:outline-none focus:border-blue-500" placeholder="e.g., Paracetamol B12">
                    </div>
                    
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-xs font-bold uppercase text-slate-500 mb-1">Quantity</label>
                            <input type="number" id="item-qty" min="0" required class="w-full p-2 border border-slate-200 rounded-lg focus:outline-none focus:border-blue-500" placeholder="100">
                        </div>
                        <div>
                            <label class="block text-xs font-bold uppercase text-slate-500 mb-1">Batch ID</label>
                            <input type="text" id="item-batch" required class="w-full p-2 border border-slate-200 rounded-lg focus:outline-none focus:border-blue-500" placeholder="B-992">
                        </div>
                    </div>

                    <div>
                        <label class="block text-xs font-bold uppercase text-slate-500 mb-1">Expiration Date</label>
                        <input type="date" id="item-expiry" required class="w-full p-2 border border-slate-200 rounded-lg focus:outline-none focus:border-blue-500">
                    </div>

                    <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-medium p-2.5 rounded-lg transition-colors cursor-pointer mt-2">
                        Add to Inventory
                    </button>
                </form>
            </section>

            <!-- Right Column: Inventory List & Status -->
            <section class="lg:col-span-2 space-y-6">
                <div class="bg-white p-4 rounded-xl shadow-sm border border-slate-100 flex flex-col sm:flex-row gap-3 items-center justify-between">
                    <div class="flex gap-2 w-full sm:w-auto">
                        <span class="text-xs font-semibold px-2.5 py-1 bg-red-100 text-red-800 rounded-md" id="expired-badge">0 Expired</span>
                        <span class="text-xs font-semibold px-2.5 py-1 bg-amber-100 text-amber-800 rounded-md" id="warning-badge">0 Near Expiry</span>
                    </div>
                    
                    <div class="flex gap-2 w-full sm:w-auto items-center">
                        <input type="text" id="search-bar" class="p-1.5 px-3 text-sm border border-slate-200 rounded-lg focus:outline-none focus:border-blue-500 flex-1 sm:w-48" placeholder="Search items...">
                        <select id="sort-dropdown" class="p-1.5 px-2 text-sm border border-slate-200 rounded-lg focus:outline-none focus:border-blue-500 bg-white text-slate-600 cursor-pointer">
                            <option value="expiry-asc">Soonest Expiry First</option>
                            <option value="expiry-desc">Furthest Expiry First</option>
                            <option value="name-asc">Alphabetical (A-Z)</option>
                            <option value="qty-asc">Lowest Stock First</option>
                            <option value="qty-desc">Highest Stock First</option>
                        </select>
                    </div>
                </div>

                <div class="bg-white rounded-xl shadow-sm border border-slate-100 overflow-hidden">
                    <div class="overflow-x-auto">
                        <table class="w-full text-left border-collapse">
                            <thead>
                                <tr class="bg-slate-50 border-b border-slate-100 text-slate-400 text-xs font-bold uppercase tracking-wider">
                                    <th class="p-4">Item details</th>
                                    <th class="p-4">Batch</th>
                                    <th class="p-4">Qty</th>
                                    <th class="p-4">Expiry Date</th>
                                    <th class="p-4 text-right">Actions</th>
                                </tr>
                            </thead>
                            <tbody id="inventory-table-body" class="divide-y divide-slate-100 text-sm"></tbody>
                        </table>
                    </div>
                    <div id="empty-state" class="p-8 text-center text-slate-400 hidden">
                        No items in inventory. Add some to get started!
                    </div>
                </div>
            </section>
        </main>
    </div>

    <script type="module">
        import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';

        const SUPABASE_URL = 'https://pmegwmiomebuuogkxztk.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBtZWd3bWlvbWVidXVvZ2t4enRrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk1MzE5MDksImV4cCI6MjA5NTEwNzkwOX0.kn2YCiXXGbOHvL47dAxgqGSEgRAImwS5ZYz9AMCfZeQ';
        const supabaseClient = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        let inventory = [];
        let userProfile = null;

        // --- ALL DOM SELECTORS DECLARED FIRST TO PREVENT TDZ DEADLOCKS ---
        const navOrgDisplay = document.getElementById('nav-org-display');
        const navUserDisplay = document.getElementById('nav-user-display');
        const logoutBtn = document.getElementById('logout-btn');
        const overlay = document.getElementById('loading-overlay');
        const form = document.getElementById('product-form');
        const tableBody = document.getElementById('inventory-table-body');
        const emptyState = document.getElementById('empty-state');
        const searchBar = document.getElementById('search-bar');
        const sortDropdown = document.getElementById('sort-dropdown');
        const exportBtn = document.getElementById('export-btn');
        const totalItemsEl = document.getElementById('total-items');
        const expiredBadge = document.getElementById('expired-badge');
        const warningBadge = document.getElementById('warning-badge');

        // Initial Security Guard Verification Sequence
        const { data: { session } } = await supabaseClient.auth.getSession();
        if (!session) {
            window.location.href = 'index.html';
        } else {
            await loadUserProfileAndContext(session.user.id);
        }

        supabaseClient.auth.onAuthStateChange((event, session) => {
            if (!session) window.location.href = 'index.html';
        });

        async function loadUserProfileAndContext(userId, retries = 5) {
            try {
                if (retries === 5) {
                    await supabaseClient.auth.refreshSession();
                }

                const { data: profile, error } = await supabaseClient
                    .from('profiles')
                    .select('*, organizations(org_name, invite_code)')
                    .eq('id', userId)
                    .maybeSingle();

                console.log("Debug - Current Profile State:", profile);

                if ((error || !profile || !profile.organization_id) && retries > 0) {
                    setTimeout(() => loadUserProfileAndContext(userId, retries - 1), 2000);
                    return;
                }

                if (!profile || !profile.organization_id) {
                    console.error("Auth Error: Profile row or organization_id is missing in public.profiles table.");
                    
                    userProfile = profile || { organization_id: 'DEBUG_MODE' };
                    navOrgDisplay.textContent = "Debug Mode (Check DB Triggers)";
                    if (navUserDisplay) navUserDisplay.textContent = "Unknown Identity (Error)";
                    overlay.classList.add('hidden');
                    
                    alert("Workspace data not found in database. Entering fallback debug mode so you can inspect the console/page.");
                    return;
                }

                userProfile = profile;
                navOrgDisplay.textContent = `${profile.organizations.org_name} (Code: ${profile.organizations.invite_code})`;
                
                if (navUserDisplay) {
                    const cleanRole = profile.role ? profile.role.trim().toLowerCase() : 'user';
                    const displayRole = cleanRole === 'admin' ? 'Administrator' : cleanRole === 'keeper' ? 'Store Keeper' : 'Team Member';
                    navUserDisplay.textContent = `${profile.full_name || 'Active Worker'} • ${displayRole}`;
                }
                
                overlay.classList.add('hidden');

                await fetchInventory();
                initializeRealtimeSync();
            } catch (err) {
                console.error("Dashboard Boot Error:", err);
                overlay.classList.add('hidden');
            }
        }

        logoutBtn.addEventListener('click', () => supabaseClient.auth.signOut());

        // --- INVENTORY ENGINE DRIVERS ---
        async function fetchInventory() {
            const { data, error } = await supabaseClient
                .from('inventory')
                .select('*')
                .eq('organization_id', userProfile.organization_id);

            if (!error) {
                inventory = data || [];
                updateStats();
                renderTable(); 
            }
        }

        function initializeRealtimeSync() {
            supabaseClient
                .channel('realtime-inventory')
                .on('postgres_changes', { 
                    event: '*', schema: 'public', table: 'inventory',
                    filter: `organization_id=eq.${userProfile.organization_id}` 
                }, (payload) => {
                    if (payload.eventType === 'INSERT') {
                        if (!inventory.some(i => i.id === payload.new.id)) inventory.push(payload.new);
                    } else if (payload.eventType === 'UPDATE') {
                        const idx = inventory.findIndex(i => i.id === payload.new.id);
                        if (idx !== -1) inventory[idx] = payload.new;
                    } else if (payload.eventType === 'DELETE') {
                        inventory = inventory.filter(i => i.id !== payload.old.id);
                    }
                    updateStats();
                    renderTable();
                }).subscribe();
        }

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const newItem = {
                name: document.getElementById('item-name').value.trim(),
                qty: parseInt(document.getElementById('item-qty').value),
                batch: document.getElementById('item-batch').value.trim(),
                expiry: document.getElementById('item-expiry').value,
                organization_id: userProfile.organization_id
            };

            const { data, error } = await supabaseClient.from('inventory').insert([newItem]).select();
            if (error) alert('Error saving entity: ' + error.message);
            else {
                if (data && !inventory.some(i => i.id === data[0].id)) inventory.push(data[0]);
                updateStats();
                renderTable();
                form.reset();
            }
        });

        window.deleteItem = async (id) => {
            await supabaseClient.from('inventory').delete().eq('id', id);
        };

        window.updateQty = async (id, delta) => {
            const item = inventory.find(i => i.id === id);
            if (!item) return;
            await supabaseClient.from('inventory').update({ qty: Math.max(0, item.qty + delta) }).eq('id', id);
        };

        searchBar.addEventListener('input', () => renderTable());
        sortDropdown.addEventListener('change', () => renderTable());

        function getExpiryStatus(dateString) {
            const today = new Date(); today.setHours(0,0,0,0);
            const expiryDate = new Date(dateString); expiryDate.setHours(0,0,0,0);
            const diffDays = Math.ceil((expiryDate - today) / (1000 * 60 * 60 * 24));

            if (diffDays < 0) return { status: 'expired', class: 'bg-red-50 text-red-700 border-red-200', text: 'Expired' };
            if (diffDays <= 90) return { status: 'warning', class: 'bg-amber-50 text-amber-700 border-amber-200', text: `Expires in ${diffDays} days` };
            return { status: 'safe', class: 'bg-green-50 text-green-700 border-green-200', text: 'Safe' };
        }

        function renderTable() {
            tableBody.innerHTML = '';
            const filterText = searchBar.value.toLowerCase();
            let processed = inventory.filter(i => i.name.toLowerCase().includes(filterText));

            processed.sort((a, b) => {
                const rule = sortDropdown.value;
                if (rule === 'expiry-asc') return new Date(a.expiry) - new Date(b.expiry);
                if (rule === 'expiry-desc') return new Date(b.expiry) - new Date(a.expiry);
                if (rule === 'name-asc') return a.name.localeCompare(b.name);
                if (rule === 'qty-asc') return a.qty - b.qty;
                if (rule === 'qty-desc') return b.qty - a.qty;
                return 0;
            });

            if (processed.length === 0) {
                emptyState.classList.remove('hidden');
                return;
            }
            emptyState.classList.add('hidden');

            processed.forEach(item => {
                const exp = getExpiryStatus(item.expiry);
                const formattedDate = new Date(item.expiry).toLocaleDateString('en-US', { year: 'numeric', month: 'short', day: 'numeric' });
                
                let rowClass = exp.status === 'expired' ? "bg-red-50/40 text-red-950" : exp.status === 'warning' ? "bg-amber-50/30 text-amber-950" : "";
                let qtyClass = item.qty === 0 ? "text-red-600 font-bold" : item.qty < 10 ? "text-amber-600 font-bold" : "font-semibold text-slate-900";
                let qtyBadge = item.qty === 0 ? `<span class="text-[10px] px-1.5 py-0.5 bg-red-100 text-red-800 font-bold rounded-sm">OUT</span>` : item.qty < 10 ? `<span class="text-[10px] px-1.5 py-0.5 bg-amber-100 text-amber-800 font-bold rounded-sm">LOW</span>` : "";

                const row = document.createElement('tr');
                row.className = `${rowClass} hover:bg-slate-50/50 border-b border-slate-100 text-sm`;
                row.innerHTML = `
                    <td class="p-4 font-medium">${item.name}</td>
                    <td class="p-4 font-mono text-slate-500">${item.batch}</td>
                    <td class="p-4">
                        <div class="flex items-center gap-2">
                            <button onclick="updateQty('${item.id}', -1)" class="w-6 h-6 rounded border border-slate-200 flex items-center justify-center hover:bg-slate-200 font-bold text-slate-700 cursor-pointer">-</button>
                            <div class="flex flex-col items-center min-w-[2.5rem]">
                                <span class="${qtyClass}">${item.qty}</span>
                                ${qtyBadge}
                            </div>
                            <button onclick="updateQty('${item.id}', 1)" class="w-6 h-6 rounded border border-slate-200 flex items-center justify-center hover:bg-slate-200 font-bold text-slate-700 cursor-pointer">+</button>
                        </div>
                    </td>
                    <td class="p-4">
                        <div class="flex flex-col gap-0.5">
                            <span class="font-medium">${formattedDate}</span>
                            <span class="text-[11px] px-1.5 py-0.5 rounded border w-fit font-medium ${exp.class}">${exp.text}</span>
                        </div>
                    </td>
                    <td class="p-4 text-right">
                        <button onclick="deleteItem('${item.id}')" class="text-slate-400 hover:text-red-600 font-medium cursor-pointer">Remove</button>
                    </td>
                `;
                tableBody.appendChild(row);
            });
        }

        function updateStats() {
            totalItemsEl.textContent = `Total Items: ${inventory.length}`;
            let expCount = 0, warnCount = 0;
            inventory.forEach(i => {
                const check = getExpiryStatus(i.expiry);
                if (check.status === 'expired') expCount++;
                if (check.status === 'warning') warnCount++;
            });
            expiredBadge.textContent = `${expCount} Expired`;
            warningBadge.textContent = `${warnCount} Near Expiry (90d)`;
        }

        exportBtn.addEventListener('click', () => {
            if (inventory.length === 0) return alert('No elements to export.');
            const headers = ['Item Name', 'Batch ID', 'Quantity', 'Expiry Date'];
            const rows = inventory.map(i => [`"${i.name}"`, `"${i.batch}"`, i.qty, i.expiry].join(','));
            const blob = new Blob([[headers.join(','), ...rows].join('\n')], { type: 'text/csv;charset=utf-8;' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `medistock_${new Date().toISOString().split('T')[0]}.csv`;
            document.body.appendChild(a); a.click(); document.body.removeChild(a);
        });
</script>
</body>
</html>
