<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MediStock Multi-Tenant Tracker</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-slate-50 text-slate-800 font-sans antialiased min-h-screen">

    <!-- AUTH SCREEN (Shown when logged out) -->
    <div id="auth-view" class="flex min-h-screen items-center justify-center p-4">
        <div class="bg-white p-6 rounded-2xl shadow-xl border border-slate-100 max-w-md w-full space-y-6">
            <div class="text-center">
                <h1 class="text-2xl font-bold text-blue-600">📦 MediStock Platform</h1>
                <p class="text-sm text-slate-500 mt-1" id="auth-subtitle">Sign in to manage your organization's stock</p>
            </div>

            <!-- Auth Mode Switch Tabs -->
            <div class="flex border-b border-slate-100 text-sm">
                <button id="tab-login" class="flex-1 pb-2 font-semibold text-blue-600 border-b-2 border-blue-600 cursor-pointer">Sign In</button>
                <button id="tab-register" class="flex-1 pb-2 font-medium text-slate-400 cursor-pointer">Register</button>
            </div>

            <!-- Main Auth Form -->
            <form id="auth-form" class="space-y-4">
                <!-- Registration Specific Fields (Hidden by default on Login) -->
                <div id="reg-fields" class="hidden space-y-4">
                    <div>
                        <label class="block text-xs font-bold uppercase text-slate-500 mb-1">Your Full Name</label>
                        <input type="text" id="auth-name" class="w-full p-2 border border-slate-200 rounded-lg focus:outline-none focus:border-blue-500" placeholder="John Doe">
                    </div>

                    <!-- Role Selector Context -->
                    <div>
                        <label class="block text-xs font-bold uppercase text-slate-500 mb-1">Account Purpose</label>
                        <div class="grid grid-cols-2 gap-2">
                            <label class="border border-blue-500 bg-blue-50/50 p-2.5 rounded-lg flex items-center gap-2 cursor-pointer text-xs font-semibold text-blue-700">
                                <input type="radio" name="auth-role" value="admin" checked class="accent-blue-600"> Register Company
                            </label>
                            <label class="border border-slate-200 p-2.5 rounded-lg flex items-center gap-2 cursor-pointer text-xs font-medium text-slate-600">
                                <input type="radio" name="auth-role" value="keeper" class="accent-blue-600"> Join as Keeper
                            </label>
                        </div>
                    </div>

                    <!-- Dynamic Tenant Context Input Fields -->
                    <div id="org-name-wrapper">
                        <label class="block text-xs font-bold uppercase text-slate-500 mb-1">Organization Name</label>
                        <input type="text" id="auth-org-name" class="w-full p-2 border border-slate-200 rounded-lg focus:outline-none focus:border-blue-500" placeholder="e.g., Apex Pharmacy Group">
                    </div>

                    <div id="invite-code-wrapper" class="hidden">
                        <label class="block text-xs font-bold uppercase text-slate-500 mb-1">Organization Invite Code</label>
                        <input type="text" id="auth-invite" class="w-full p-2 border border-slate-200 rounded-lg focus:outline-none focus:border-blue-500 uppercase font-mono" placeholder="ORG-XXXXXX">
                    </div>
                </div>

                <!-- Core Credentials Fields -->
                <div>
                    <label class="block text-xs font-bold uppercase text-slate-500 mb-1">Email Address</label>
                    <input type="email" id="auth-email" required class="w-full p-2 border border-slate-200 rounded-lg focus:outline-none focus:border-blue-500" placeholder="you@company.com">
                </div>

                <div>
                    <label class="block text-xs font-bold uppercase text-slate-500 mb-1">Password</label>
                    <input type="password" id="auth-password" required minlength="6" class="w-full p-2 border border-slate-200 rounded-lg focus:outline-none focus:border-blue-500" placeholder="••••••••">
                </div>

                <button type="submit" id="auth-submit-btn" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-medium p-2.5 rounded-lg transition-colors cursor-pointer pt-2">
                    Access Dashboard
                </button>
            </form>
        </div>
    </div>


    <!-- APP DASHBOARD VIEW (Hidden when logged out) -->
    <div id="dashboard-view" class="hidden">
        <!-- Navbar -->
        <nav class="bg-blue-600 text-white shadow-md p-4">
            <div class="max-w-6xl mx-auto flex flex-col sm:flex-row justify-between items-center gap-3">
                <div class="flex items-center gap-2">
                    <h1 class="text-xl font-bold tracking-tight">📦 MediStock</h1>
                    <span id="nav-org-display" class="text-xs bg-blue-700 text-blue-100 font-bold px-2.5 py-1 rounded border border-blue-500/30 font-mono">Loading Organization...</span>
                </div>
                <div class="flex items-center gap-3 w-full sm:w-auto justify-end">
                    <button id="export-btn" class="text-xs bg-blue-500 hover:bg-blue-700 font-semibold px-3 py-1.5 rounded-full transition-colors cursor-pointer flex items-center gap-1 border border-blue-400/30 shadow-sm">
                        📥 Export CSV
                    </button>
                    <span class="text-sm bg-blue-700 px-3 py-1 rounded-full whitespace-nowrap" id="total-items">Total Items: 0</span>
                    <button id="logout-btn" class="text-xs font-semibold bg-red-500 hover:bg-red-600 text-white px-3 py-1.5 rounded-lg cursor-pointer transition-colors">
                        Logout
                    </button>
                </div>
            </div>
        </nav>

        <!-- Main Content Container -->
        <main class="max-w-6xl mx-auto p-4 md:p-6 grid grid-cols-1 lg:grid-cols-3 gap-6">
            <!-- Left Column: Add Product Form -->
            <section class="bg-white p-6 rounded-xl shadow-sm border border-slate-100 h-fit">
                <h2 class="text-lg font-semibold mb-4 text-slate-900">Add New Batch</h2>
                <form id="product-form" class="space-y-4">
                    <div>
                        <label class="block text-xs font-bold uppercase text-slate-500 mb-1">Item Name</label>
                        <input type="text" id="item-name" required class="w-full p-2 border border-slate-200 rounded-lg focus:outline-none focus:border-blue-500" placeholder="e.g., Paracetamol B12">
                    </div>
                    
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-xs font-bold uppercase text-slate-500 mb-1">Quantity</label>
                            <input type="number" id="item-qty" min="0" required class="w-full p-2 border border-slate-200 rounded-lg focus:outline-none focus:border-blue-500" placeholder="100">
                        </div>
                        <div>
                            <label class="block text-xs font-bold uppercase text-slate-500 mb-1">Batch ID</label>
                            <input type="text" id="item-batch" required class="w-full p-2 border border-slate-200 rounded-lg focus:outline-none focus:border-blue-500" placeholder="B-992">
                        </div>
                    </div>

                    <div>
                        <label class="block text-xs font-bold uppercase text-slate-500 mb-1">Expiration Date</label>
                        <input type="date" id="item-expiry" required class="w-full p-2 border border-slate-200 rounded-lg focus:outline-none focus:border-blue-500">
                    </div>

                    <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-medium p-2.5 rounded-lg transition-colors cursor-pointer mt-2">
                        Add to Inventory
                    </button>
                </form>
            </section>

            <!-- Right Column: Inventory List & Status -->
            <section class="lg:col-span-2 space-y-6">
                <!-- Filters, Sorting & Alerts Overview -->
                <div class="bg-white p-4 rounded-xl shadow-sm border border-slate-100 flex flex-col sm:flex-row gap-3 items-center justify-between">
                    <div class="flex gap-2 w-full sm:w-auto">
                        <span class="text-xs font-semibold px-2.5 py-1 bg-red-100 text-red-800 rounded-md" id="expired-badge">0 Expired</span>
                        <span class="text-xs font-semibold px-2.5 py-1 bg-amber-100 text-amber-800 rounded-md" id="warning-badge">0 Near Expiry</span>
                    </div>
                    
                    <!-- Search and Sort controls layout -->
                    <div class="flex gap-2 w-full sm:w-auto items-center">
                        <input type="text" id="search-bar" class="p-1.5 px-3 text-sm border border-slate-200 rounded-lg focus:outline-none focus:border-blue-500 flex-1 sm:w-48" placeholder="Search items...">
                        
                        <select id="sort-dropdown" class="p-1.5 px-2 text-sm border border-slate-200 rounded-lg focus:outline-none focus:border-blue-500 bg-white text-slate-600 cursor-pointer">
                            <option value="expiry-asc">Soonest Expiry First</option>
                            <option value="expiry-desc">Furthest Expiry First</option>
                            <option value="name-asc">Alphabetical (A-Z)</option>
                            <option value="qty-asc">Lowest Stock First</option>
                            <option value="qty-desc">Highest Stock First</option>
                        </select>
                    </div>
                </div>

                <!-- Inventory Table Container -->
                <div class="bg-white rounded-xl shadow-sm border border-slate-100 overflow-hidden">
                    <div class="overflow-x-auto">
                        <table class="w-full text-left border-collapse">
                            <thead>
                                <tr class="bg-slate-50 border-b border-slate-100 text-slate-400 text-xs font-bold uppercase tracking-wider">
                                    <th class="p-4">Item details</th>
                                    <th class="p-4">Batch</th>
                                    <th class="p-4">Qty</th>
                                    <th class="p-4">Expiry Date</th>
                                    <th class="p-4 text-right">Actions</th>
                                </tr>
                            </thead>
                            <tbody id="inventory-table-body" class="divide-y divide-slate-100 text-sm">
                                <!-- Dynamic rows injected here -->
                            </tbody>
                        </table>
                    </div>
                    <!-- Empty State Message -->
                    <div id="empty-state" class="p-8 text-center text-slate-400 hidden">
                        No items in inventory. Add some to get started!
                    </div>
                </div>
            </section>
        </main>
    </div>

    <!-- Script Architecture Module Logic Layer -->
    <script type="module">
        import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';

        const SUPABASE_URL = 'https://pmegwmiomebuuogkxztk.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBtZWd3bWlvbWVidXVvZ2t4enRrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk1MzE5MDksImV4cCI6MjA5NTEwNzkwOX0.kn2YCiXXGbOHvL47dAxgqGSEgRAImwS5ZYz9AMCfZeQ';
        const supabaseClient = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // Core Platform Structural State
        let inventory = [];
        let userProfile = null;
        let isLoginMode = true;

        // DOM Views 
        const authView = document.getElementById('auth-view');
        const dashboardView = document.getElementById('dashboard-view');
        const authForm = document.getElementById('auth-form');
        
        // Navigation / Metadata Labels
        const navOrgDisplay = document.getElementById('nav-org-display');
        const logoutBtn = document.getElementById('logout-btn');

        // Form elements for switching modes
        const tabLogin = document.getElementById('tab-login');
        const tabRegister = document.getElementById('tab-register');
        const regFields = document.getElementById('reg-fields');
        const authSubtitle = document.getElementById('auth-subtitle');
        const authSubmitBtn = document.getElementById('auth-submit-btn');

        // Form specific data links
        const orgNameWrapper = document.getElementById('org-name-wrapper');
        const inviteCodeWrapper = document.getElementById('invite-code-wrapper');
        const roleRadios = document.getElementsByName('auth-role');

        // --- AUTHENTICATION INTERFACE UI ROUTING STATE CONTROLS ---
        tabLogin.addEventListener('click', () => toggleAuthMode(true));
        tabRegister.addEventListener('click', () => toggleAuthMode(false));

        function toggleAuthMode(showLogin) {
            isLoginMode = showLogin;
            if (showLogin) {
                tabLogin.className = "flex-1 pb-2 font-semibold text-blue-600 border-b-2 border-blue-600 cursor-pointer";
                tabRegister.className = "flex-1 pb-2 font-medium text-slate-400 cursor-pointer";
                regFields.classList.add('hidden');
                authSubtitle.textContent = "Sign in to manage your organization's stock";
                authSubmitBtn.textContent = "Access Dashboard";
            } else {
                tabRegister.className = "flex-1 pb-2 font-semibold text-blue-600 border-b-2 border-blue-600 cursor-pointer";
                tabLogin.className = "flex-1 pb-2 font-medium text-slate-400 cursor-pointer";
                regFields.classList.remove('hidden');
                authSubtitle.textContent = "Create a workspace or join an existing company team";
                authSubmitBtn.textContent = "Complete Registration";
            }
        }

        // Toggle sub-registration configurations inside signup tabs
        roleRadios.forEach(radio => {
            radio.addEventListener('change', (e) => {
                if (e.target.value === 'admin') {
                    orgNameWrapper.classList.remove('hidden');
                    inviteCodeWrapper.classList.add('hidden');
                } else {
                    orgNameWrapper.classList.add('hidden');
                    inviteCodeWrapper.classList.remove('hidden');
                }
            });
        });

        // Handle Form Submission: Route to Login or Multi-Tier Signup Pipeline
        authForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('auth-email').value.trim();
            const password = document.getElementById('auth-password').value;

            if (isLoginMode) {
                // Sign In Execution Pathway
                const { error } = await supabaseClient.auth.signInWithPassword({ email, password });
                if (error) alert("Login Error: " + error.message);
            } else {
                // Registration Execution Pathway
                const fullName = document.getElementById('auth-name').value.trim();
                const selectedRole = document.querySelector('input[name="auth-role"]:checked').value;

                if (selectedRole === 'keeper') {
                    // Keeper validation sequence
                    const code = document.getElementById('auth-invite').value.trim().toUpperCase();
                    const { data: org, error: orgErr } = await supabaseClient
                        .from('organizations')
                        .select('id')
                        .eq('invite_code', code)
                        .single();

                    if (orgErr || !org) {
                        alert("Invalid Invite Code. Please check with your supervisor.");
                        return;
                    }

                    const { error } = await supabaseClient.auth.signUp({
                        email,
                        password,
                        options: { data: { full_name: fullName, role: 'keeper', organization_id: org.id } }
                    });
                    if (error) alert("Registration failed: " + error.message);
                    else alert("Account Created! You can now switch to the 'Sign In' tab.");
                } else {
                    // Admin registration sequence: Simply hand metadata to the upgraded database pipeline
                    const companyName = document.getElementById('auth-org-name').value.trim();
                    
                    const { error } = await supabaseClient.auth.signUp({
                        email,
                        password,
                        options: { 
                            data: { 
                                full_name: fullName, 
                                role: 'admin', 
                                org_name: companyName 
                            } 
                        }
                    });

                    if (error) {
                        alert("Registration failed: " + error.message);
                    } else {
                        alert("Workspace created! Switch over to the 'Sign In' tab to access your new dashboard.");
                    }
                }
            }
        });

        logoutBtn.addEventListener('click', () => supabaseClient.auth.signOut());

        // --- CORE APPLICATION LIFECYCLE LISTENERS ---
        supabaseClient.auth.onAuthStateChange(async (event, session) => {
            if (session) {
                await loadUserProfileAndContext(session.user.id);
            } else {
                userProfile = null;
                inventory = [];
                dashboardView.classList.add('hidden');
                authView.classList.remove('hidden');
            }
        });

        async function loadUserProfileAndContext(userId) {
            try {
                const { data: profile, error } = await supabaseClient
                    .from('profiles')
                    .select('*, organizations(org_name, invite_code)')
                    .eq('id', userId)
                    .maybeSingle();

                if (error || !profile || !profile.organization_id) {
                    // Fallback timing delay safeguard to wait for the Postgres trigger to settle
                    setTimeout(async () => {
                        const { data: retryProfile } = await supabaseClient
                            .from('profiles')
                            .select('*, organizations(org_name, invite_code)')
                            .eq('id', userId)
                            .maybeSingle();
                        
                        if (retryProfile && retryProfile.organization_id) {
                            renderDashboard(retryProfile);
                        }
                    }, 1000);
                    return;
                }

                renderDashboard(profile);
            } catch (err) {
                console.error(err);
            }
        }

        function renderDashboard(profile) {
            userProfile = profile;
            navOrgDisplay.textContent = `${profile.organizations.org_name} (Code: ${profile.organizations.invite_code})`;
            authView.classList.add('hidden');
            dashboardView.classList.remove('hidden');
            fetchInventory();
            initializeRealtimeSync();
        }

        // --- INVENTORY MANAGEMENT DRIVERS SCOPED BY TENANT ---
        const form = document.getElementById('product-form');
        const tableBody = document.getElementById('inventory-table-body');
        const emptyState = document.getElementById('empty-state');
        const searchBar = document.getElementById('search-bar');
        const sortDropdown = document.getElementById('sort-dropdown');
        const exportBtn = document.getElementById('export-btn');
        
        const totalItemsEl = document.getElementById('total-items');
        const expiredBadge = document.getElementById('expired-badge');
        const warningBadge = document.getElementById('warning-badge');

        async function fetchInventory() {
            if (!userProfile) return;
            try {
                // Query isolated by user profile parameters
                const { data, error } = await supabaseClient
                    .from('inventory')
                    .select('*')
                    .eq('organization_id', userProfile.organization_id);

                if (error) return console.error('Error fetching data:', error.message);
                inventory = data || [];
                renderTable();
                updateStats();
            } catch (err) {
                console.error(err);
            }
        }

        function initializeRealtimeSync() {
            if (!userProfile) return;
            supabaseClient
                .channel('tenant-inventory-changes')
                .on('postgres_changes', { 
                    event: '*', 
                    schema: 'public', 
                    table: 'inventory',
                    filter: `organization_id=eq.${userProfile.organization_id}` 
                }, (payload) => {
                    if (payload.eventType === 'INSERT') {
                        if (!inventory.some(item => item.id === payload.new.id)) inventory.push(payload.new);
                    } else if (payload.eventType === 'UPDATE') {
                        const index = inventory.findIndex(item => item.id === payload.new.id);
                        if (index !== -1) inventory[index] = payload.new;
                    } else if (payload.eventType === 'DELETE') {
                        inventory = inventory.filter(item => item.id !== payload.old.id);
                    }
                    renderTable();
                    updateStats();
                })
                .subscribe();
        }

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            if (!userProfile) return;
            
            const newItem = {
                name: document.getElementById('item-name').value.trim(),
                qty: parseInt(document.getElementById('item-qty').value),
                batch: document.getElementById('item-batch').value.trim(),
                expiry: document.getElementById('item-expiry').value,
                organization_id: userProfile.organization_id // Tag block to tenant space
            };

            try {
                const { data, error } = await supabaseClient
                    .from('inventory')
                    .insert([newItem])
                    .select();

                if (error) return alert('Failed to add item: ' + error.message);
                if (data && data.length > 0 && !inventory.some(item => item.id === data[0].id)) {
                    inventory.push(data[0]);
                    renderTable();
                    updateStats();
                }
                form.reset();
            } catch (err) {
                console.error(err);
            }
        });

        window.deleteItem = async (id) => {
            try {
                const { error } = await supabaseClient.from('inventory').delete().eq('id', id);
                if (error) alert('Failed to delete item: ' + error.message);
            } catch (err) { console.error(err); }
        };

        window.updateQty = async (id, delta) => {
            const item = inventory.find(item => item.id === id);
            if (!item) return;
            const newQty = Math.max(0, item.qty + delta);

            try {
                const { error } = await supabaseClient.from('inventory').update({ qty: newQty }).eq('id', id);
                if (error) alert('Failed to update quantity: ' + error.message);
            } catch (err) { console.error(err); }
        };

        // Export data to CSV 
        exportBtn.addEventListener('click', () => {
            if (inventory.length === 0) return alert('There are no items to export.');
            const headers = ['Item Name', 'Batch ID', 'Quantity', 'Expiry Date', 'Status Class'];
            const csvRows = inventory.map(item => {
                const statusCheck = getExpiryStatus(item.expiry);
                return [`"${item.name.replace(/"/g, '""')}"`, `"${item.batch.replace(/"/g, '""')}"`, item.qty, item.expiry, statusCheck.text].join(',');
            });
            const blob = new Blob([[headers.join(','), ...csvRows].join('\n')], { type: 'text/csv;charset=utf-8;' });
            const downloadUrl = URL.createObjectURL(blob);
            const hiddenAnchor = document.createElement('a');
            hiddenAnchor.setAttribute('href', downloadUrl);
            hiddenAnchor.setAttribute('download', `medistock_report_${new Date().toISOString().split('T')[0]}.csv`);
            hiddenAnchor.style.visibility = 'hidden';
            document.body.appendChild(hiddenAnchor);
            hiddenAnchor.click();
            document.body.removeChild(hiddenAnchor);
        });

        searchBar.addEventListener('input', () => renderTable());
        sortDropdown.addEventListener('change', () => renderTable());

        function getExpiryStatus(dateString) {
            const today = new Date(); today.setHours(0,0,0,0);
            const expiryDate = new Date(dateString); expiryDate.setHours(0,0,0,0);
            const diffDays = Math.ceil((expiryDate - today) / (1000 * 60 * 60 * 24));

            if (diffDays < 0) return { status: 'expired', class: 'bg-red-50 text-red-700 border-red-200', text: 'Expired' };
            if (diffDays <= 90) return { status: 'warning', class: 'bg-amber-50 text-amber-700 border-amber-200', text: `Expires in ${diffDays} days` };
            return { status: 'safe', class: 'bg-green-50 text-green-700 border-green-200', text: 'Safe' };
        }

        function renderTable() {
            tableBody.innerHTML = '';
            const filterText = searchBar.value.toLowerCase();
            let processedData = inventory.filter(item => item.name.toLowerCase().includes(filterText));

            const sortRule = sortDropdown.value;
            processedData.sort((a, b) => {
                if (sortRule === 'expiry-asc') return new Date(a.expiry) - new Date(b.expiry);
                if (sortRule === 'expiry-desc') return new Date(b.expiry) - new Date(a.expiry);
                if (sortRule === 'name-asc') return a.name.localeCompare(b.name);
                if (sortRule === 'qty-asc') return a.qty - b.qty;
                if (sortRule === 'qty-desc') return b.qty - a.qty;
                return 0;
            });

            if (processedData.length === 0) return emptyState.classList.remove('hidden');
            emptyState.classList.add('hidden');

            processedData.forEach(item => {
                const expiryInfo = getExpiryStatus(item.expiry);
                const formattedDate = new Date(item.expiry).toLocaleDateString('en-US', { year: 'numeric', month: 'short', day: 'numeric' });

                let rowClass = "hover:bg-slate-50/50 transition-colors";
                if (expiryInfo.status === 'expired') rowClass = "bg-red-50/40 hover:bg-red-100/50 text-red-950 transition-colors";
                else if (expiryInfo.status === 'warning') rowClass = "bg-amber-50/30 hover:bg-amber-100/40 text-amber-950 transition-colors";

                let qtyClass = "font-semibold text-slate-900"; let qtyBadge = "";
                if (item.qty === 0) { qtyClass = "text-red-600 font-bold"; qtyBadge = `<span class="text-[10px] px-1.5 py-0.5 font-bold uppercase tracking-wide bg-red-100 text-red-800 rounded-sm border border-red-200 w-fit">OUT</span>`; }
                else if (item.qty < 10) { qtyClass = "text-amber-600 font-bold"; qtyBadge = `<span class="text-[10px] px-1.5 py-0.5 font-bold uppercase tracking-wide bg-amber-100 text-amber-800 rounded-sm border border-amber-200 w-fit">LOW</span>`; }

                const row = document.createElement('tr');
                row.className = rowClass;
                row.innerHTML = `
                    <td class="p-4 font-medium text-slate-900">${item.name}</td>
                    <td class="p-4 text-slate-500 font-mono">${item.batch}</td>
                    <td class="p-4">
                        <div class="flex items-center gap-2">
                            <button onclick="updateQty('${item.id}', -1)" class="w-6 h-6 rounded border border-slate-200 flex items-center justify-center hover:bg-slate-200 font-bold text-slate-700 cursor-pointer">-</button>
                            <div class="flex flex-col items-center min-w-[2.5rem] gap-0.5">
                                <span class="${qtyClass}">${item.qty}</span>
                                ${qtyBadge}
                            </div>
                            <button onclick="updateQty('${item.id}', 1)" class="w-6 h-6 rounded border border-slate-200 flex items-center justify-center hover:bg-slate-200 font-bold text-slate-700 cursor-pointer">+</button>
                        </div>
                    </td>
                    <td class="p-4">
                        <div class="flex flex-col gap-0.5">
                            <span class="font-medium">${formattedDate}</span>
                            <span class="text-[11px] px-1.5 py-0.5 rounded border w-fit font-medium ${expiryInfo.class}">${expiryInfo.text}</span>
                        </div>
                    </td>
                    <td class="p-4 text-right">
                        <button onclick="deleteItem('${item.id}')" class="text-slate-400 hover:text-red-600 font-medium transition-colors cursor-pointer">Remove</button>
                    </td>
                `;
                tableBody.appendChild(row);
            });
        }

        function updateStats() {
            totalItemsEl.textContent = `Total Items: ${inventory.length}`;
            let expiredCount = 0; let warningCount = 0;
            inventory.forEach(item => {
                const check = getExpiryStatus(item.expiry);
                if (check.status === 'expired') expiredCount++; if (check.status === 'warning') warningCount++;
            });
            expiredBadge.textContent = `${expiredCount} Expired`;
            warningBadge.textContent = `${warningCount} Near Expiry (90d)`;
        }
    </script>
</body>
</html>
