<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MediStock Platform - Access Gateway</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-slate-50 text-slate-800 font-sans antialiased min-h-screen flex items-center justify-center p-4">

    <div class="bg-white p-6 rounded-2xl shadow-xl border border-slate-100 max-w-md w-full space-y-6">
        <div class="text-center">
            <h1 class="text-2xl font-bold text-blue-600">📦 MediStock Platform</h1>
            <p class="text-sm text-slate-500 mt-1" id="auth-subtitle">Sign in to manage your organization's stock</p>
        </div>

        <!-- Auth Mode Switch Tabs -->
        <div class="flex border-b border-slate-100 text-sm">
            <button id="tab-login" class="flex-1 pb-2 font-semibold text-blue-600 border-b-2 border-blue-600 cursor-pointer">Sign In</button>
            <button id="tab-register" class="flex-1 pb-2 font-medium text-slate-400 cursor-pointer">Register</button>
        </div>

        <!-- Unified Auth Form -->
        <form id="auth-form" class="space-y-4">
            <!-- Registration Fields (Hidden on Login Mode) -->
            <div id="reg-fields" class="hidden space-y-4">
                <div>
                    <label class="block text-xs font-bold uppercase text-slate-500 mb-1">Your Full Name</label>
                    <input type="text" id="auth-name" class="w-full p-2 border border-slate-200 rounded-lg focus:outline-none focus:border-blue-500" placeholder="John Doe">
                </div>

                <div>
                    <label class="block text-xs font-bold uppercase text-slate-500 mb-1">Account Purpose</label>
                    <div class="grid grid-cols-2 gap-2">
                        <label class="border border-blue-500 bg-blue-50/50 p-2.5 rounded-lg flex items-center gap-2 cursor-pointer text-xs font-semibold text-blue-700">
                            <input type="radio" name="auth-role" value="admin" checked class="accent-blue-600"> Register Company
                        </label>
                        <label class="border border-slate-200 p-2.5 rounded-lg flex items-center gap-2 cursor-pointer text-xs font-medium text-slate-600">
                            <input type="radio" name="auth-role" value="keeper" class="accent-blue-600"> Join as Keeper
                        </label>
                    </div>
                </div>

                <div id="org-name-wrapper">
                    <label class="block text-xs font-bold uppercase text-slate-500 mb-1">Organization Name</label>
                    <input type="text" id="auth-org-name" class="w-full p-2 border border-slate-200 rounded-lg focus:outline-none focus:border-blue-500" placeholder="e.g., Apex Pharmacy Group">
                </div>

                <div id="invite-code-wrapper" class="hidden">
                    <label class="block text-xs font-bold uppercase text-slate-500 mb-1">Organization Invite Code</label>
                    <input type="text" id="auth-invite" class="w-full p-2 border border-slate-200 rounded-lg focus:outline-none focus:border-blue-500 uppercase font-mono" placeholder="ORG-XXXXXX">
                </div>
            </div>

            <!-- Core Credentials -->
            <div>
                <label class="block text-xs font-bold uppercase text-slate-500 mb-1">Email Address</label>
                <input type="email" id="auth-email" required class="w-full p-2 border border-slate-200 rounded-lg focus:outline-none focus:border-blue-500" placeholder="you@company.com">
            </div>

            <div>
                <label class="block text-xs font-bold uppercase text-slate-500 mb-1">Password</label>
                <input type="password" id="auth-password" required minlength="6" class="w-full p-2 border border-slate-200 rounded-lg focus:outline-none focus:border-blue-500" placeholder="••••••••">
            </div>

            <button type="submit" id="auth-submit-btn" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-medium p-2.5 rounded-lg transition-colors cursor-pointer pt-2">
                Access Dashboard
            </button>
        </form>
    </div>

    <script type="module">
        import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';

        const SUPABASE_URL = 'https://pmegwmiomebuuogkxztk.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBtZWd3bWlvbWVidXVvZ2t4enRrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk1MzE5MDksImV4cCI6MjA5NTEwNzkwOX0.kn2YCiXXGbOHvL47dAxgqGSEgRAImwS5ZYz9AMCfZeQ';
        const supabaseClient = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        let isLoginMode = true;

        const authForm = document.getElementById('auth-form');
        const tabLogin = document.getElementById('tab-login');
        const tabRegister = document.getElementById('tab-register');
        const regFields = document.getElementById('reg-fields');
        const authSubtitle = document.getElementById('auth-subtitle');
        const authSubmitBtn = document.getElementById('auth-submit-btn');
        const orgNameWrapper = document.getElementById('org-name-wrapper');
        const inviteCodeWrapper = document.getElementById('invite-code-wrapper');
        const roleRadios = document.getElementsByName('auth-role');

        // Watch for active state shifts
        supabaseClient.auth.onAuthStateChange((event, session) => {
            if (session) window.location.href = 'dashboard.html';
        });

        tabLogin.addEventListener('click', () => toggleAuthMode(true));
        tabRegister.addEventListener('click', () => toggleAuthMode(false));

        function toggleAuthMode(showLogin) {
            isLoginMode = showLogin;
            if (showLogin) {
                tabLogin.className = "flex-1 pb-2 font-semibold text-blue-600 border-b-2 border-blue-600 cursor-pointer";
                tabRegister.className = "flex-1 pb-2 font-medium text-slate-400 cursor-pointer";
                regFields.classList.add('hidden');
                authSubtitle.textContent = "Sign in to manage your organization's stock";
                authSubmitBtn.textContent = "Access Dashboard";
            } else {
                tabRegister.className = "flex-1 pb-2 font-semibold text-blue-600 border-b-2 border-blue-600 cursor-pointer";
                tabLogin.className = "flex-1 pb-2 font-medium text-slate-400 cursor-pointer";
                regFields.classList.remove('hidden');
                authSubtitle.textContent = "Create a workspace or join an existing company team";
                authSubmitBtn.textContent = "Complete Registration";
            }
        }

        roleRadios.forEach(radio => {
            radio.addEventListener('change', (e) => {
                if (e.target.value === 'admin') {
                    orgNameWrapper.classList.remove('hidden');
                    inviteCodeWrapper.classList.add('hidden');
                } else {
                    orgNameWrapper.classList.add('hidden');
                    inviteCodeWrapper.classList.remove('hidden');
                }
            });
        });

        authForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('auth-email').value.trim();
            const password = document.getElementById('auth-password').value;

            if (isLoginMode) {
                const { error } = await supabaseClient.auth.signInWithPassword({ email, password });
                if (error) alert("Login Error: " + error.message);
            } else {
                const fullName = document.getElementById('auth-name').value.trim();
                const selectedRole = document.querySelector('input[name="auth-role"]:checked').value;

                if (selectedRole === 'keeper') {
                    const code = document.getElementById('auth-invite').value.trim().toUpperCase();
                    const { data: org, error: orgErr } = await supabaseClient
                        .from('organizations')
                        .select('id')
                        .eq('invite_code', code)
                        .single();

                    if (orgErr || !org) {
                        alert("Invalid Invite Code. Please verify with your workspace administrator.");
                        return;
                    }

                    const { error } = await supabaseClient.auth.signUp({
                        email,
                        password,
                        options: { data: { full_name: fullName, role: 'keeper', organization_id: org.id } }
                    });
                    if (error) alert("Registration failed: " + error.message);
                    else {
                        alert("Account Created successfully! Switching back to login tab.");
                        toggleAuthMode(true);
                    }
                } else {
                    const companyName = document.getElementById('auth-org-name').value.trim();
                    const { error } = await supabaseClient.auth.signUp({
                        email,
                        password,
                        options: { data: { full_name: fullName, role: 'admin', org_name: companyName } }
                    });

                    if (error) alert("Registration failed: " + error.message);
                    else {
                        alert("Workspace built! Logging you into your session shortly...");
                    }
                }
            }
        });
    </script>
</body>
</html>
