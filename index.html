<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stock & Expiry Tracker</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- Supabase JS Library -->
   <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-slate-50 text-slate-800 font-sans antialiased">

    <!-- Navbar -->
    <nav class="bg-blue-600 text-white shadow-md p-4">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <h1 class="text-xl font-bold tracking-tight">📦 MediStock Tracker</h1>
            <span class="text-sm bg-blue-700 px-3 py-1 rounded-full" id="total-items">Total Items: 0</span>
        </div>
    </nav>

    <!-- Main Content Container -->
    <main class="max-w-6xl mx-auto p-4 md:p-6 grid grid-cols-1 lg:grid-cols-3 gap-6">
        
        <!-- Left Column: Add Product Form -->
        <section class="bg-white p-6 rounded-xl shadow-sm border border-slate-100 h-fit">
            <h2 class="text-lg font-semibold mb-4 text-slate-900">Add New Batch</h2>
            <form id="product-form" class="space-y-4">
                <div>
                    <label class="block text-xs font-bold uppercase text-slate-500 mb-1">Item Name</label>
                    <input type="text" id="item-name" required class="w-full p-2 border border-slate-200 rounded-lg focus:outline-none focus:border-blue-500" placeholder="e.g., Paracetamol B12">
                </div>
                
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs font-bold uppercase text-slate-500 mb-1">Quantity</label>
                        <input type="number" id="item-qty" min="0" required class="w-full p-2 border border-slate-200 rounded-lg focus:outline-none focus:border-blue-500" placeholder="100">
                    </div>
                    <div>
                        <label class="block text-xs font-bold uppercase text-slate-500 mb-1">Batch ID</label>
                        <input type="text" id="item-batch" required class="w-full p-2 border border-slate-200 rounded-lg focus:outline-none focus:border-blue-500" placeholder="B-992">
                    </div>
                </div>

                <div>
                    <label class="block text-xs font-bold uppercase text-slate-500 mb-1">Expiration Date</label>
                    <input type="date" id="item-expiry" required class="w-full p-2 border border-slate-200 rounded-lg focus:outline-none focus:border-blue-500">
                </div>

                <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-medium p-2.5 rounded-lg transition-colors cursor-pointer mt-2">
                    Add to Inventory
                </button>
            </form>
        </section>

        <!-- Right Column: Inventory List & Status -->
        <section class="lg:col-span-2 space-y-6">
            
            <!-- Filters & Alerts Overview -->
            <div class="bg-white p-4 rounded-xl shadow-sm border border-slate-100 flex flex-wrap gap-3 items-center justify-between">
                <div class="flex gap-2">
                    <span class="text-xs font-semibold px-2.5 py-1 bg-red-100 text-red-800 rounded-md" id="expired-badge">0 Expired</span>
                    <span class="text-xs font-semibold px-2.5 py-1 bg-amber-100 text-amber-800 rounded-md" id="warning-badge">0 Near Expiry</span>
                </div>
                <input type="text" id="search-bar" class="p-1.5 px-3 text-sm border border-slate-200 rounded-lg focus:outline-none focus:border-blue-500 w-full sm:w-64" placeholder="Search items...">
            </div>

            <!-- Inventory Table Container -->
            <div class="bg-white rounded-xl shadow-sm border border-slate-100 overflow-hidden">
                <div class="overflow-x-auto">
                    <table class="w-full text-left border-collapse">
                        <thead>
                            <tr class="bg-slate-50 border-b border-slate-100 text-slate-400 text-xs font-bold uppercase tracking-wider">
                                <th class="p-4">Item details</th>
                                <th class="p-4">Batch</th>
                                <th class="p-4">Qty</th>
                                <th class="p-4">Expiry Date</th>
                                <th class="p-4 text-right">Actions</th>
                            </tr>
                        </thead>
                        <tbody id="inventory-table-body" class="divide-y divide-slate-100 text-sm">
                            <!-- Dynamic rows injected here -->
                        </tbody>
                    </table>
                </div>
                <!-- Empty State Message -->
                <div id="empty-state" class="p-8 text-center text-slate-400 hidden">
                    No items in inventory. Add some to get started!
                </div>
            </div>
        </section>
    </main>

    <!-- Logic Script -->
    <script>
        // 1. Initialize Supabase Client
const SUPABASE_URL = 'https://pmegwmiomebuuogkxztk.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBtZWd3bWlvbWVidXVvZ2t4enRrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk1MzE5MDksImV4cCI6MjA5NTEwNzkwOX0.kn2YCiXXGbOHvL47dAxgqGSEgRAImwS5ZYz9AMCfZeQ';
const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// State management
let inventory = [];

// DOM elements
const form = document.getElementById('product-form');
const tableBody = document.getElementById('inventory-table-body');
const emptyState = document.getElementById('empty-state');
const searchBar = document.getElementById('search-bar');

// Stats elements
const totalItemsEl = document.getElementById('total-items');
const expiredBadge = document.getElementById('expired-badge');
const warningBadge = document.getElementById('warning-badge');

// 2. Fetch Data on Load
async function fetchInventory() {
    const { data, error } = await supabase
        .from('inventory')
        .select('*')
        .order('expiry', { ascending: true }); // Keep closest expiry dates at the top

    if (error) {
        console.error('Error fetching inventory:', error.message);
        return;
    }

    inventory = data || [];
    renderTable();
    updateStats();
}

// 3. Handle Form Submission (Insert)
form.addEventListener('submit', async (e) => {
    e.preventDefault();
    
    const newItem = {
        name: document.getElementById('item-name').value.trim(),
        qty: parseInt(document.getElementById('item-qty').value),
        batch: document.getElementById('item-batch').value.trim(),
        expiry: document.getElementById('item-expiry').value
    };

    const { data, error } = await supabase
        .from('inventory')
        .insert([newItem])
        .select();

    if (error) {
        alert('Failed to add item: ' + error.message);
    } else {
        inventory.push(data[0]);
        renderTable();
        updateStats();
        form.reset();
    }
});

// 4. Delete Item
window.deleteItem = async (id) => {
    const { error } = await supabase
        .from('inventory')
        .delete()
        .eq('id', id);

    if (error) {
        alert('Failed to delete item: ' + error.message);
    } else {
        inventory = inventory.filter(item => item.id !== id);
        renderTable();
        updateStats();
    }
};

// 5. Adjust Quantity Inline (Update)
window.updateQty = async (id, delta) => {
    const item = inventory.find(item => item.id === id);
    if (!item) return;

    const newQty = Math.max(0, item.qty + delta);

    const { error } = await supabase
        .from('inventory')
        .update({ qty: newQty })
        .eq('id', id);

    if (error) {
        alert('Failed to update quantity: ' + error.message);
    } else {
        item.qty = newQty;
        renderTable();
    }
};

// Live Search filtering (Client-side)
searchBar.addEventListener('input', (e) => {
    renderTable(e.target.value.toLowerCase());
});

// Determine Expiry Status
function getExpiryStatus(dateString) {
    const today = new Date();
    today.setHours(0,0,0,0);
    const expiryDate = new Date(dateString);
    expiryDate.setHours(0,0,0,0);
    
    const diffTime = expiryDate - today;
    const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));

    if (diffDays < 0) return { status: 'expired', class: 'bg-red-50 text-red-700 border-red-200', text: 'Expired' };
    if (diffDays <= 90) return { status: 'warning', class: 'bg-amber-50 text-amber-700 border-amber-200', text: `Expires in ${diffDays} days` };
    return { status: 'safe', class: 'bg-green-50 text-green-700 border-green-200', text: 'Safe' };
}

// Render Table UI
function renderTable(filter = '') {
    tableBody.innerHTML = '';
    const filteredData = inventory.filter(item => item.name.toLowerCase().includes(filter));

    if (filteredData.length === 0) {
        emptyState.classList.remove('hidden');
        return;
    }
    emptyState.classList.add('hidden');

    filteredData.forEach(item => {
        const expiryInfo = getExpiryStatus(item.expiry);
        const formattedDate = new Date(item.expiry).toLocaleDateString('en-US', { year: 'numeric', month: 'short', day: 'numeric' });

        const row = document.createElement('tr');
        row.className = "hover:bg-slate-50/50 transition-colors";
        row.innerHTML = `
            <td class="p-4 font-medium text-slate-900">${item.name}</td>
            <td class="p-4 text-slate-500 font-mono">${item.batch}</td>
            <td class="p-4 font-semibold">
                <div class="flex items-center gap-2">
                    <button onclick="updateQty('${item.id}', -1)" class="w-6 h-6 rounded border border-slate-200 flex items-center justify-center hover:bg-slate-100 cursor-pointer">-</button>
                    <span class="${item.qty === 0 ? 'text-red-500 font-bold' : ''}">${item.qty}</span>
                    <button onclick="updateQty('${item.id}', 1)" class="w-6 h-6 rounded border border-slate-200 flex items-center justify-center hover:bg-slate-100 cursor-pointer">+</button>
                </div>
            </td>
            <td class="p-4">
                <div class="flex flex-col gap-0.5">
                    <span class="font-medium">${formattedDate}</span>
                    <span class="text-[11px] px-1.5 py-0.5 rounded border w-fit font-medium ${expiryInfo.class}">${expiryInfo.text}</span>
                </div>
            </td>
            <td class="p-4 text-right">
                <button onclick="deleteItem('${item.id}')" class="text-slate-400 hover:text-red-600 font-medium transition-colors cursor-pointer">Remove</button>
            </td>
        `;
        tableBody.appendChild(row);
    });
}

// Update Overview Statistics
function updateStats() {
    totalItemsEl.textContent = `Total Items: ${inventory.length}`;
    
    let expiredCount = 0;
    let warningCount = 0;

    inventory.forEach(item => {
        const check = getExpiryStatus(item.expiry);
        if (check.status === 'expired') expiredCount++;
        if (check.status === 'warning') warningCount++;
    });

    expiredBadge.textContent = `${expiredCount} Expired`;
    warningBadge.textContent = `${warningCount} Near Expiry (90d)`;
}

// Kick off initial database load
fetchInventory();
            
    </script>
</body>
  </html>
